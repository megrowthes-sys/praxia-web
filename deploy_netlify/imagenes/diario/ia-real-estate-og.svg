<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="ogtitle">
  <title id="ogtitle">IA en operadoras de real estate · Praxia Atelier</title>
  <defs>
    <style>
      .paper { fill: #faf8f3; }
      .ink { fill: #1a1f2e; }
      .accent { fill: #b9522e; }
      .accent-soft { fill: #f3ddd0; }
      .moss-soft { fill: #d8dfcd; }
      .serif { font-family: "Fraunces", Georgia, serif; font-weight: 500; }
      .sans { font-family: "IBM Plex Sans", system-ui, sans-serif; }
      .mono { font-family: "JetBrains Mono", ui-monospace, monospace; letter-spacing: .14em; text-transform: uppercase; }
    </style>
  </defs>

  <!-- Fondo paper con franja accent superior -->
  <rect class="paper" width="1200" height="630" />
  <rect class="accent" x="0" y="0" width="1200" height="6" />

  <!-- Logo P + marca -->
  <rect fill="none" stroke="#1a1f2e" stroke-width="2" x="80" y="80" width="40" height="40" />
  <text class="serif" x="100" y="111" font-size="26" fill="#1a1f2e" text-anchor="middle">P</text>
  <text class="serif" x="140" y="106" font-size="22" fill="#1a1f2e">Praxia Atelier</text>
  <text class="mono" x="140" y="125" font-size="9" fill="#44485a">Diario · IA aplicada</text>

  <!-- Línea editorial -->
  <line stroke="#e6e1d6" stroke-width="1.5" x1="80" y1="180" x2="1120" y2="180" />

  <!-- Categoría -->
  <text class="mono" x="80" y="225" font-size="14" fill="#b9522e">IA aplicada · Real estate</text>

  <!-- Título principal -->
  <text class="serif" x="80" y="295" font-size="56" fill="#1a1f2e">IA en operadoras de</text>
  <text class="serif" x="80" y="360" font-size="56" fill="#1a1f2e">real estate:</text>
  <text class="serif" x="80" y="425" font-size="44" fill="#44485a" font-style="italic">qué automatizar y qué no.</text>

  <!-- Pill/etiqueta visual destacada -->
  <rect class="accent-soft" x="80" y="475" width="280" height="40" rx="20" />
  <text class="mono" x="100" y="500" font-size="11" fill="#b9522e">Lectura editorial · 7 min</text>

  <!-- Autora + fecha · pie -->
  <line stroke="#e6e1d6" stroke-width="1" x1="80" y1="555" x2="1120" y2="555" />
  <text class="sans" x="80" y="585" font-size="16" fill="#1a1f2e">Marta Escobar Rojas</text>
  <text class="mono" x="80" y="605" font-size="11" fill="#44485a">Madrid · 8 mayo 2026</text>
  <text class="mono" x="1120" y="595" font-size="11" fill="#44485a" text-anchor="end">praxia-atelier.net</text>
</svg>
